version: 2

sources:
  - name: tpch_source
    database: SNOWFLAKE_SAMPLE_DATA
    schema: TPCH_SF1
    tables:
      - name: orders
      - name: lineitem
      - name: part
      - name: customer
      - name: supplier
      - name: region
      - name: nation
      - name: partsupp
    
models:
  - name: stg_tpch_orders
    description: "Modelado de órdenes con lógica incremental"
    columns:
      - name: order_id
        description: "Llave primaria de la orden"
        tests:
          - unique
          - not_null
      - name: total_price
        tests:
          - is_positive:
              config:
                severity: error

  - name: stg_tpch_lineitem
    columns:
      - name: order_id
        tests:
          - not_null
      - name: quantity
        tests:
          - is_positive:
              config:
                severity: warn